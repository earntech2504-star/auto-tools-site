<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Free AI Tools - No Login Needed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
       .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
       .subtitle {
            text-align: center;
            color: #f0f0f0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
       .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
       .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
       .card:hover {
            transform: translateY(-5px);
        }
       .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
       .card p {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
       .result {
            margin-top: 20px;
            min-height: 50px;
        }
       .result img {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
       .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #48bb78;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }
       .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
       .error {
            color: #e53e3e;
            font-weight: 600;
            padding: 10px;
            background: #fff5f5;
            border-radius: 6px;
        }
       .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 12 Free AI Tools</h1>
        <p class="subtitle">No Login • No AWS • Powered by HuggingFace & Remove.bg</p>

        <div class="grid">
            <!-- Tool 1: AI Image Generator -->
            <div class="card">
                <h2>🎨 AI Image Generator</h2>
                <p>Create images from text using Stable Diffusion XL</p>
                <input type="text" id="promptInput" placeholder="e.g. A cat wearing sunglasses on a beach" />
                <button onclick="generateImage()">Generate Image</button>
                <div class="result" id="result1"></div>
            </div>

            <!-- Tool 2: Background Remover -->
            <div class="card">
                <h2>✂️ Background Remover</h2>
                <p>Remove image background instantly - Get transparent PNG</p>
                <input type="file" id="imageInput" accept="image/*" />
                <button onclick="removeBackground()">Remove Background</button>
                <div class="result" id="result2"></div>
            </div>
        </div>

        <div class="footer">
            <p>Made with ❤️ by Sandeep | 100% Free & Open Source</p>
        </div>
    </div>

    <script>
        // 1. AI Image Generator Function
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value;
            const resultDiv = document.getElementById('result1');

            if (!prompt) {
                resultDiv.innerHTML = '<div class="error">Please enter a prompt first!</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">🎨 Generating image... Wait 15-20 seconds ⏳</div>';

            try {
                const res = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                if (!res.ok) {
                    throw new Error('API failed');
                }

                const blob = await res.blob();
                const imgUrl = URL.createObjectURL(blob);
                resultDiv.innerHTML = `
                    <img src="${imgUrl}" alt="Generated Image" />
                    <a href="${imgUrl}" download="ai-generated.png" class="download-btn">⬇️ Download Image</a>
                `;
            } catch (err) {
                resultDiv.innerHTML = '<div class="error">❌ Error: Check HF_TOKEN in Vercel Environment Variables</div>';
                console.error(err);
            }
        }

        // 2. Background Remover Function
        async function removeBackground() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result2');

            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<div class="error">Please select an image first!</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">✂️ Removing background... ⏳</div>';
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const res = await fetch('/api/remove-bg', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    throw new Error('API failed');
                }

                const blob = await res.blob();
                const imgUrl = URL.createObjectURL(blob);
                resultDiv.innerHTML = `
                    <img src="${imgUrl}" alt="No Background" />
                    <a href="${imgUrl}" download="no-background.png" class="download-btn">⬇️ Download PNG</a>
                `;
            } catch (err) {
                resultDiv.innerHTML = '<div class="error">❌ Error: Check REMOVE_BG_KEY in Vercel Environment Variables</div>';
                console.error(err);
            }
        }
    </script>
</body>
</html>
